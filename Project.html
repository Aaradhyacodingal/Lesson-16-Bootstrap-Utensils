<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Example</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

  <!-- Jumbotron -->
  <div class="p-5 mb-4 bg-light rounded-3">
    <div class="container-fluid py-5">
      <h1 class="display-5 fw-bold">Welcome to My Website</h1>
      <p class="col-md-8 fs-4">This is a simple Bootstrap jumbotron example with badges and progress bars.</p>
      <button class="btn btn-primary btn-lg" type="button">Learn More</button>
    </div>
  </div>

  <div class="container">
    <!-- Badges -->
    <h2>Badges</h2>
    <p>
      Notifications <span class="badge bg-primary">4</span>
      Messages <span class="badge bg-success">7</span>
      Alerts <span class="badge bg-danger">2</span>
    </p>

    <!-- Progress Bar -->
    <h2>Progress Bar</h2>
    <div class="progress" style="height: 25px;">
      <div class="progress-bar bg-info" role="progressbar" style="width: 60%;" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
        60%
      </div>
    </div>
  </div>
</body>
  <!-- Bootstrap JS -->
